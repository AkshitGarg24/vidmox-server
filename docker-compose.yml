services:
  redis:
    image: redis:7.4-alpine
    container_name: vidmox-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-vidmox} --appendonly yes --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

volumes:
  redis_data:
